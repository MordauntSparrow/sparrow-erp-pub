# Optional include for TLS-terminated deployments (paste inside server/location blocks).
# When TLS is at the edge (e.g. Railway), enable HSTS at the edge, not on plain HTTP origin.

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

# Clickjacking: SAMEORIGIN or DENY depending on whether you embed admin in iframes
add_header X-Frame-Options "SAMEORIGIN" always;

# Uncomment only for HTTPS listeners or edge TLS that forwards X-Forwarded-Proto: https
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
