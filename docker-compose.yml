version: "3.9"

services:
  sparrow-erp:
    build: .
    container_name: sparrow-erp
    ports:
      - "82:82" # Flask / ERP
      - "80:80" # Website (can be enabled later in Admin UI)
    environment:
      - TZ=Europe/London
      - APP_ROOT=/app/app
      # Ventus MDT PWA push (optional): set in app/config/.env instead, or pass through here — never commit real keys.
      # - VENTUS_MDT_VAPID_PUBLIC_KEY=
      # - VENTUS_MDT_VAPID_PRIVATE_KEY=
      # - VENTUS_MDT_VAPID_SUBJECT=mailto:mdt@yourdomain.example
    restart: unless-stopped
