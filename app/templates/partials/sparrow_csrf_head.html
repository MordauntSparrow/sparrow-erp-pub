{# SeaSurf (Flask-SeaSurf): expose token + auto-attach X-CSRFToken on mutating fetch().
   Include once per layout <head>. Also defines sparrowMergeCsrfHeaders / tbMergeCsrfHeaders for explicit use. #}
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="csrf-token" content="{{ csrf_token() }}">
<script>
(function () {
  function getCsrfToken() {
    var el = document.querySelector('meta[name="csrf-token"]');
    return el && el.getAttribute('content') ? String(el.getAttribute('content')).trim() : '';
  }
  if (typeof window.sparrowMergeCsrfHeaders !== 'function') {
    window.sparrowMergeCsrfHeaders = function (headers, method) {
      var m = String(method || 'GET').toUpperCase();
      var t = getCsrfToken();
      if (headers instanceof Headers) {
        var h = new Headers(headers);
        if ((m === 'POST' || m === 'PUT' || m === 'PATCH' || m === 'DELETE') && t) {
          if (!h.has('X-CSRFToken') && !h.has('X-CSRF-Token')) h.set('X-CSRFToken', t);
        }
        return h;
      }
      var o = Object.assign({}, headers || {});
      if ((m === 'POST' || m === 'PUT' || m === 'PATCH' || m === 'DELETE') && t) {
        if (!o['X-CSRFToken'] && !o['X-CSRF-Token']) o['X-CSRFToken'] = t;
      }
      return o;
    };
  }
  if (typeof window.tbMergeCsrfHeaders !== 'function' && typeof window.sparrowMergeCsrfHeaders === 'function') {
    window.tbMergeCsrfHeaders = window.sparrowMergeCsrfHeaders;
  }
  if (typeof window.fetch !== 'function' || window.__sparroWFetchCsrf) return;
  window.__sparroWFetchCsrf = true;
  var _nativeFetch = window.fetch.bind(window);
  window.fetch = function (input, init) {
    init = init ? Object.assign({}, init) : {};
    var method = String(init.method || 'GET').toUpperCase();
    if (!['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) {
      return _nativeFetch(input, init);
    }
    var t = getCsrfToken();
    if (!t) return _nativeFetch(input, init);
    var h = init.headers;
    if (h instanceof Headers) {
      var nh = new Headers(h);
      if (!nh.has('X-CSRFToken') && !nh.has('X-CSRF-Token')) nh.set('X-CSRFToken', t);
      init.headers = nh;
    } else if (Array.isArray(h)) {
      var hasT = false;
      for (var i = 0; i < h.length; i++) {
        var kk = h[i] && h[i][0];
        if (kk && String(kk).toLowerCase() === 'x-csrftoken') hasT = true;
      }
      init.headers = hasT ? h : (h || []).concat([['X-CSRFToken', t]]);
    } else {
      var o = Object.assign({}, h || {});
      if (!o['X-CSRFToken'] && !o['X-CSRF-Token']) o['X-CSRFToken'] = t;
      init.headers = o;
    }
    return _nativeFetch(input, init);
  };
})();
</script>
