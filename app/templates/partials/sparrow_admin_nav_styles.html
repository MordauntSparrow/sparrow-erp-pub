{# Shared ERP admin top nav + module subnav (matches time billing admin). Include inside a <style> block. #}
/* ===== Navbar (Sparrow ERP admin shell) ===== */
.navbar {
  {% if config.theme_settings.theme == 'dark' %}
    background-color: #1f1f1f;
  {% else %}
    background-color: #ffffff;
  {% endif %}
}
.navbar .nav-link, .navbar-brand {
  {% if config.theme_settings.theme == 'dark' %}
    color: #e6e6e6;
  {% else %}
    color: #212529;
  {% endif %}
}
.navbar .nav-link:hover, .navbar .nav-link:focus {
  {% if config.theme_settings.theme == 'dark' %}
    color: #1e90ff;
  {% else %}
    color: #0d6efd;
  {% endif %}
  text-decoration: none;
}
.navbar .nav-link i { transition: transform 0.2s ease; }
.navbar .nav-link:hover i { transform: scale(1.2); }

.navbar-erp .nav-primary .nav-link {
  font-weight: 500;
  border-radius: 0.35rem;
}
.navbar-erp .nav-primary .nav-link.active {
  {% if config.theme_settings.theme == 'dark' %}
  background: rgba(30, 144, 255, 0.15);
  color: #5eb3ff !important;
  {% else %}
  background: rgba(13, 110, 253, 0.1);
  color: #0d6efd !important;
  {% endif %}
}
.navbar-erp .dropdown-menu { min-width: 13rem; }
.navbar-erp .nav-label-muted {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.65;
  padding: 0.35rem 1rem 0.15rem;
}

/* Module subnav */
.nav-module { font-size: 0.9rem; }
.nav-module .nav-link { padding: 0.5rem 0.75rem; border-radius: 0.375rem; }
.nav-module .nav-link.active { font-weight: 600; }
{% if config.theme_settings.theme == 'dark' %}
.nav-module .nav-link { color: #b0b0b0; }
.nav-module .nav-link:hover { color: #fff; background: rgba(255,255,255,.08); }
.nav-module .nav-link.active { color: #1e90ff; background: rgba(30,144,255,.15); }
{% else %}
.nav-module .nav-link { color: #495057; }
.nav-module .nav-link:hover { color: #0d6efd; background: #f8f9fa; }
.nav-module .nav-link.active { color: #0d6efd; background: #e7f1ff; }
{% endif %}

@media (max-width: 768px) {
  .table-responsive { -webkit-overflow-scrolling: touch; overflow-x: auto; }
  main.container-fluid { padding-left: max(0.75rem, env(safe-area-inset-left)); padding-right: max(0.75rem, env(safe-area-inset-right)); }
  .btn-group .btn { min-height: 44px; }
  .navbar .nav-link { min-height: 44px; display: inline-flex; align-items: center; }
}
