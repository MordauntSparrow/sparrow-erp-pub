<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site_settings.company_name or 'Sparrow ERP' }} - Set New Password</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-GLhlTQ8iRABzZr6jPRf6a4eUhp1jStjV+W2TuvU5pHk7z6VoO5vo/2aCWeU2TjpZ" crossorigin="anonymous">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #eef1f7, #dce3f3);
      font-family: 'Arial', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-container {
      max-width: 450px;
      width: 100%;
      padding: 30px;
      background-color: #ffffff;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      text-align: center;
    }
    .login-container h1,
    .login-container h2 {
      margin-bottom: 20px;
      font-weight: 700;
      color: #333;
    }
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #6c757d;
      font-size: 16px;
    }
    .input-group .form-control {
      padding-left: 45px;
      height: 50px;
      border-radius: 30px;
      font-size: 1rem;
    }
    .form-control:focus {
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
      border-color: #007bff;
    }
    .btn-primary {
      background-color: #007bff;
      border-color: #007bff;
      color: #fff;
      border-radius: 30px;
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
    }
    .btn-primary:hover {
      background-color: #0056b3;
      border-color: #004085;
    }
    .footer-text {
      margin-top: 20px;
      font-size: 0.9em;
      color: #777;
    }
    .brand-logo {
      margin-bottom: 20px;
      object-fit: contain;
    }
  </style>
</head>
<body>

<div class="login-container">
  <!-- Dynamic Company Branding -->
  {% if site_settings.branding == 'logo' and site_settings.logo_path %}
    <img src="{{ url_for('static', filename=normalize_manifest_static_path(site_settings.logo_path)) }}"
         alt="{{ site_settings.company_name }}" class="brand-logo" style="{{ auth_logo_inline_style(site_settings) }}">
  {% else %}
    <h1>{{ site_settings.company_name or 'Sparrow ERP' }}</h1>
  {% endif %}

  <!-- Set New Password Form -->
  <h2 class="mb-4">Set New Password</h2>
  <form method="POST" action="{{ url_for('routes.reset_password', token=token) }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="input-group">
      <span class="input-icon"><i class="fas fa-lock"></i></span>
      <input type="password" class="form-control" id="password" name="password" placeholder="New Password" required>
    </div>
    <div class="input-group">
      <span class="input-icon"><i class="fas fa-lock"></i></span>
      <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
    </div>
    <button type="submit" class="btn btn-primary">Reset Password</button>
  </form>

  <!-- Footer -->
  <div class="footer-text">
    <p>&copy; {{ current_year }} {{ site_settings.company_name or 'Sparrow ERP' }}. All rights reserved. | Powered by Sparrow ERP</p>
    <p><a href="{{ url_for('routes.login') }}">Back to Login</a></p>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" 
        integrity="sha384-oBqDVmMz4fnFO9gyb06iD02j6g5/1aNQoz+9DVsEgn/5jBpMcaX9HSh" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" 
        integrity="sha384-pzjw8f+ua7Kw1TIq0+t5A9f+dA6O8zGHb6l44y6JxaXQd8dPjo6jICkRkufET7Hq3" crossorigin="anonymous"></script>
</body>
</html>
