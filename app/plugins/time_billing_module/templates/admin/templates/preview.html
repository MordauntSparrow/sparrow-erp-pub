{% extends "admin/base_timesheet_billing_module.html" %}
{% block content %}
<div class="container py-3">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h4 class="mb-0 d-flex align-items-center">
            <i class="bi bi-eye me-2"></i> Template Preview
        </h4>
        <a class="btn btn-secondary btn-sm" href="{{ url_for('internal_time_billing.runsheets_page') }}">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>
    </div>

    <!-- Preview Body -->
    <div class="card">
        <div class="card-body" id="previewBody">Loading…</div>
    </div>

</div>

<script>
    (async function () {
        const tplId = (location.hash.match(/preview-(\d+)/) || [])[1];
        const body = document.getElementById('previewBody');
        const TEMPLATE_API_BASE = `{{ url_for('internal_time_billing.get_template', tpl_id=0) }}`.replace(/\/0$/, '');
        const templateFieldsUrl = () => TEMPLATE_API_BASE + '/' + tplId + '/fields';

        async function load() {
            if (!tplId) {
                body.innerHTML = '<div class="text-danger">Open from Templates with #preview-&lt;id&gt; in the URL.</div>';
                return;
            }
            const r = await fetch(templateFieldsUrl());
            const fields = await r.json();

            if (!fields.length) {
                body.innerHTML = '<div class="text-muted">No fields.</div>';
                return;
            }

            const frag = document.createDocumentFragment();

            fields.forEach(f => {
                const div = document.createElement('div');
                div.className = 'mb-3';

                // Label
                const label = document.createElement('label');
                label.className = 'form-label';
                label.textContent = f.label || f.key || 'Field';

                // Input
                let input;
                if (f.type === 'textarea') {
                    input = document.createElement('textarea');
                    input.className = 'form-control';
                } else if (f.type === 'select') {
                    input = document.createElement('select');
                    input.className = 'form-select';
                } else {
                    input = document.createElement('input');
                    if (f.type === 'checkbox') {
                        input.type = 'checkbox';
                        input.className = 'form-check-input';
                    } else {
                        input.type = f.type || 'text';
                        input.className = 'form-control';
                    }
                }

                div.appendChild(label);
                div.appendChild(input);
                frag.appendChild(div);
            });

            body.innerHTML = '';
            body.appendChild(frag);
        }

        load();
    })();
</script>
{% endblock %}
