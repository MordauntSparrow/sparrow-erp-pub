{% extends "base.html" %}
{% block title %}New assignment – Training Admin{% endblock %}
{% block content %}
<div class="container mt-4">
  <h1 class="mb-3">New assignment</h1>
  <form method="post" action="{{ url_for('internal_training.admin_assignment_create') }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="card mb-3">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Training item <span class="text-danger">*</span></label>
          <select name="training_item_id" class="form-select" required>
            <option value="">Select item</option>
            {% for i in items %}
            <option value="{{ i.id }}">{{ i.title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Contractor <span class="text-danger">*</span></label>
          <select name="contractor_id" class="form-select" required>
            <option value="">Select contractor</option>
            {% for c in contractors %}
            <option value="{{ c.id }}">{{ c.name }}{% if c.email %} ({{ c.email }}){% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Due date</label>
          <input type="date" name="due_date" class="form-control">
        </div>
        <div class="form-check">
          <input type="checkbox" name="mandatory" value="1" class="form-check-input" id="mandatory">
          <label class="form-check-label" for="mandatory">Mandatory</label>
        </div>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Create assignment</button>
    <a href="{{ url_for('internal_training.admin_assignments') }}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
