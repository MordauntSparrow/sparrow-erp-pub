{% extends "base.html" %}
{% block title %}Assign – {{ course.title }}{% endblock %}
{% block content %}
<div class="container mt-4 col-lg-8">
  <h1 class="h4 mb-3">Assign: {{ course.title }}</h1>
  <form method="post" class="card p-3 mb-3">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="mode" value="contractor">
    <h2 class="h6">One contractor</h2>
    <div class="mb-2">
      <select class="form-select" name="contractor_id" required>
        <option value="">Select…</option>
        {% for c in contractors %}
        <option value="{{ c.id }}">{{ c.name }} ({{ c.email }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-2">
      <label class="form-label small">Due date</label>
      <input type="date" class="form-control" name="due_date">
    </div>
    <div class="form-check mb-2">
      <input class="form-check-input" type="checkbox" name="mandatory" value="1" id="m1" checked>
      <label class="form-check-label" for="m1">Mandatory</label>
    </div>
    <button type="submit" class="btn btn-primary btn-sm">Assign</button>
  </form>
  <form method="post" class="card p-3">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="mode" value="role">
    <h2 class="h6">All active staff in role</h2>
    {% if roles %}
    <div class="mb-2">
      <select class="form-select" name="role_id" required>
        <option value="">Select role…</option>
        {% for r in roles %}
        <option value="{{ r.id }}">{{ r.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-2">
      <label class="form-label small">Due date</label>
      <input type="date" class="form-control" name="due_date">
    </div>
    <div class="form-check mb-2">
      <input class="form-check-input" type="checkbox" name="mandatory" value="1" id="m2" checked>
      <label class="form-check-label" for="m2">Mandatory</label>
    </div>
    <button type="submit" class="btn btn-outline-primary btn-sm">Assign to role</button>
    {% else %}
    <p class="text-muted small mb-0">No roles table or empty — use contractor assign.</p>
    {% endif %}
  </form>
  <a href="{{ url_for('internal_training.admin_courses') }}" class="btn btn-outline-secondary btn-sm mt-3">Back to courses</a>
</div>
{% endblock %}
