{# Shared recruitment admin chrome: include once per page inside {% block content %} #}
<style>
  .rec-admin { --rec-teal: #0d9488; --rec-teal-dark: #0f766e; --rec-maroon: #9f1239; --rec-surface: #f8fafc; }
  .rec-admin .rec-topnav {
    background: linear-gradient(135deg, var(--rec-teal) 0%, var(--rec-teal-dark) 100%);
    border-radius: 12px;
    padding: 0.35rem 0.75rem;
    margin-bottom: 1.25rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.25rem;
  }
  .rec-admin .rec-topnav a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    padding: 0.45rem 0.85rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
  }
  .rec-admin .rec-topnav a:hover { color: #fff; background: rgba(255,255,255,0.12); }
  .rec-admin .rec-topnav a.rec-nav-active { color: #fff; background: rgba(255,255,255,0.2); }
  .rec-admin .rec-toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .rec-admin .rec-btn-new {
    background: var(--rec-teal); border: none; color: #fff !important;
    font-weight: 600; padding: 0.55rem 1.25rem; border-radius: 8px;
    text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem;
    box-shadow: 0 2px 8px rgba(13,148,136,0.35);
  }
  .rec-admin .rec-btn-new:hover { background: var(--rec-teal-dark); color: #fff !important; }
  .rec-admin .rec-search-pill {
    border-radius: 999px; border: 1px solid #e2e8f0; padding: 0.35rem 1rem;
    min-width: 220px; max-width: 360px; flex: 1;
  }
  .rec-admin .rec-job-card {
    border: 1px solid #e2e8f0; border-radius: 12px; background: #fff;
    box-shadow: 0 1px 3px rgba(15,23,42,0.06);
    position: relative; overflow: visible; height: 100%;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  /* Clip ribbon + body to rounded corners; footer stays outside so dropdowns are not clipped */
  .rec-admin .rec-job-card-surface {
    position: relative;
    overflow: hidden;
    border-radius: 12px 12px 0 0;
  }
  .rec-admin .rec-job-card:hover {
    box-shadow: 0 8px 24px rgba(15,23,42,0.1);
    transform: translateY(-2px);
  }
  /* Diagonal LIVE strip (pointer-events off so it never blocks Edit / More clicks) */
  .rec-admin .rec-job-card .rec-ribbon {
    position: absolute;
    top: 12px;
    right: -32px;
    z-index: 2;
    transform: rotate(45deg);
    background: #7c3aed;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 0.35rem 2.5rem;
    text-transform: uppercase;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    pointer-events: none;
  }
  .rec-admin .rec-job-card .rec-card-body { padding: 1.1rem 1.15rem 1rem; }
  .rec-admin .rec-job-card .rec-job-title {
    font-size: 1.05rem; font-weight: 700; color: #0f172a; line-height: 1.3; margin: 0 0 0.35rem; padding-right: 0.25rem;
  }
  .rec-admin .rec-job-card-surface:has(.rec-ribbon) .rec-job-title { padding-right: 5.5rem; }
  .rec-admin .rec-meta-line { font-size: 0.8rem; color: #64748b; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.35rem; }
  .rec-admin .rec-meta-line i { opacity: 0.7; }
  .rec-admin .rec-metric-row { display: flex; flex-wrap: wrap; gap: 0.75rem 1rem; margin: 0.85rem 0; }
  .rec-admin .rec-metric { font-size: 0.8rem; }
  .rec-admin .rec-metric strong { display: block; font-size: 1.15rem; color: var(--rec-maroon); line-height: 1.2; }
  .rec-admin .rec-metric span { color: #64748b; }
  .rec-admin .rec-cta-new-apps {
    display: block; width: 100%; text-align: center;
    background: var(--rec-teal); color: #fff !important; font-weight: 600;
    padding: 0.55rem 0.75rem; border-radius: 8px; text-decoration: none; font-size: 0.85rem;
    margin-bottom: 0.65rem;
  }
  .rec-admin .rec-cta-new-apps:hover { background: var(--rec-teal-dark); color: #fff !important; }
  .rec-admin .rec-alert-pill { font-size: 0.72rem; padding: 0.2rem 0.5rem; border-radius: 6px; font-weight: 600; }
  .rec-admin .rec-footer-mini {
    border-top: 1px solid #f1f5f9;
    padding: 0.65rem 1.15rem;
    font-size: 0.78rem;
    border-radius: 0 0 12px 12px;
    background: #fff;
  }
  .rec-admin .rec-stat-tile {
    border-radius: 12px; border: 1px solid #e2e8f0; background: #fff;
    padding: 1rem 1.15rem; height: 100%;
  }
  .rec-admin .rec-stat-tile h3 { font-size: 1.65rem; font-weight: 700; margin: 0; color: #0f172a; }
  .rec-admin .rec-stat-tile p { margin: 0.25rem 0 0; font-size: 0.8rem; color: #64748b; }
</style>
