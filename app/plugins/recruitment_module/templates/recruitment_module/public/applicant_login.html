{% extends "recruitment_module/public/base_public.html" %}
{% block title %}Applicant sign in{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Applicant sign in</h1>
<form method="post" action="{{ url_for('public_recruitment_site.applicant_login_post') }}" class="col-md-5">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="next" value="{{ next_url }}">
  <div class="mb-3">
    <label class="form-label" for="email">Email</label>
    <input type="email" class="form-control" id="email" name="email" required autocomplete="username">
  </div>
  <div class="mb-3">
    <label class="form-label" for="password">Password</label>
    <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
  </div>
  <button type="submit" class="btn btn-primary">Sign in</button>
  <a class="btn btn-link" href="{{ url_for('public_recruitment_site.applicant_register', next=next_url) if next_url else url_for('public_recruitment_site.applicant_register') }}">Create account</a>
</form>
{% endblock %}
