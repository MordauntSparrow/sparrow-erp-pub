{# UK MOT + DVLA enrichment; include inside a <form> that has registration, make, model, year, fuel_type, mot_expiry, tax_expiry #}
<div class="alert alert-light border small mb-3 py-2">
  <div class="row g-2 align-items-end">
    <div class="col-md-4">
      <label class="form-label small mb-0">UK registration lookup</label>
      <input class="form-control form-control-sm" type="text" id="fleet_uk_reg_input" placeholder="e.g. AB12 CDE" autocomplete="off">
    </div>
    <div class="col-md-4">
      <button class="btn btn-sm btn-outline-primary mt-3 mt-md-4" type="button" id="fleet_uk_reg_btn">Fetch MOT &amp; tax from GOV.UK</button>
    </div>
    <div class="col-md-4 small text-muted" id="fleet_uk_reg_msg"></div>
  </div>
</div>
<script>
(function () {
  var regInput = document.getElementById('fleet_uk_reg_input');
  var btn = document.getElementById('fleet_uk_reg_btn');
  var msg = document.getElementById('fleet_uk_reg_msg');
  if (!btn || !regInput) return;
  var form = regInput.closest('form');
  btn.addEventListener('click', function () {
    var reg = regInput.value.trim();
    if (!reg) {
      msg.className = 'col-md-4 small text-warning';
      msg.textContent = 'Enter a registration';
      return;
    }
    msg.className = 'col-md-4 small text-muted';
    msg.textContent = 'Looking up…';
    fetch('{{ url_for("fleet_management.api_uk_vehicle_lookup") }}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ registration: reg })
    }).then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
      .then(function (res) {
        var data = res.data;
        if (!res.ok) {
          msg.className = 'col-md-4 small text-danger';
          msg.textContent = data.error || 'Request failed';
          return;
        }
        if (!data.sources || !data.sources.length) {
          msg.className = 'col-md-4 small text-muted';
          msg.textContent = (data.errors && data.errors.length) ? 'No data returned for that registration.' : 'No data returned';
          return;
        }
        function set(name, val) {
          if (val === undefined || val === null || val === '') return;
          if (!form) return;
          var el = form.querySelector('[name="' + name + '"]');
          if (!el) return;
          if (el.tagName === 'SELECT') {
            var v = String(val).toLowerCase();
            for (var i = 0; i < el.options.length; i++) {
              if (el.options[i].value.toLowerCase() === v) { el.selectedIndex = i; return; }
            }
            return;
          }
          el.value = val;
        }
        set('registration', data.registration);
        set('make', data.make);
        set('model', data.model);
        set('year', data.year);
        if (data.fuel_type) set('fuel_type', String(data.fuel_type).toLowerCase());
        set('mot_expiry', data.mot_expiry);
        set('tax_expiry', data.tax_expiry);
        msg.className = 'col-md-4 small text-success';
        msg.textContent = 'Filled from: ' + data.sources.join(', ') + '.';
      }).catch(function () {
        msg.className = 'col-md-4 small text-danger';
        msg.textContent = 'Network error';
      });
  });
})();
</script>
