{% extends "scheduling_module/base_public.html" %}
{% block content %}
<h1 class="h5 mb-3">Report sickness</h1>
<p class="text-muted small mb-3">Report whole day(s) off sick or a specific time (e.g. hospital appointment).</p>
<form method="post" action="{{ url_for('public_scheduling.report_sickness_submit') }}" class="card card-module p-3" id="sickness-form">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <div class="row g-2 mb-3">
    <div class="col">
      <label class="form-label">Start date</label>
      <input type="date" name="start_date" class="form-control form-control-dark bg-dark text-light" value="{{ today }}" required>
    </div>
    <div class="col">
      <label class="form-label">End date</label>
      <input type="date" name="end_date" class="form-control form-control-dark bg-dark text-light" value="{{ today }}" required>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Duration</label>
    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
      <label class="form-check form-check-inline">
        <input type="radio" name="whole_day" value="1" class="form-check-input" id="whole-day-yes" checked> Whole day(s)
      </label>
      <label class="form-check form-check-inline">
        <input type="radio" name="whole_day" value="0" class="form-check-input" id="whole-day-no"> Specific times
      </label>
    </div>
    <div id="time-fields" class="mt-2" style="display: none;">
      <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
        <button type="button" class="btn btn-outline-primary btn-sm" id="btn-all-day">All day</button>
        <label class="d-inline-flex align-items-center gap-1 small"><span>After</span><input type="time" id="after-time" class="form-control form-control-sm form-control-dark bg-dark text-light" style="width:auto"></label>
        <label class="d-inline-flex align-items-center gap-1 small"><span>Before</span><input type="time" id="before-time" class="form-control form-control-sm form-control-dark bg-dark text-light" style="width:auto"></label>
      </div>
      <div class="row g-2">
        <div class="col">
          <label class="form-label small mb-0">Start time</label>
          <input type="time" name="start_time" id="start_time" class="form-control form-control-dark bg-dark text-light" value="09:00">
        </div>
        <div class="col">
          <label class="form-label small mb-0">End time</label>
          <input type="time" name="end_time" id="end_time" class="form-control form-control-dark bg-dark text-light" value="17:00">
        </div>
      </div>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Notes (optional)</label>
    <input type="text" name="reason" class="form-control form-control-dark bg-dark text-light" placeholder="Optional details">
  </div>
  <button type="submit" class="btn btn-warning text-dark">Report sickness</button>
  <a href="{{ url_for('public_scheduling.my_requests') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
<script>
(function() {
  var form = document.getElementById('sickness-form');
  if (!form) return;
  var wholeDayYes = document.getElementById('whole-day-yes');
  var wholeDayNo = document.getElementById('whole-day-no');
  var timeFields = document.getElementById('time-fields');
  var startTime = document.getElementById('start_time');
  var endTime = document.getElementById('end_time');
  var afterTime = document.getElementById('after-time');
  var beforeTime = document.getElementById('before-time');
  var btnAllDay = document.getElementById('btn-all-day');
  function setTimes(s, e) { if (startTime) startTime.value = s; if (endTime) endTime.value = e; }
  function toggle() {
    timeFields.style.display = wholeDayNo && wholeDayNo.checked ? 'block' : 'none';
    if (startTime) startTime.disabled = wholeDayYes && wholeDayYes.checked;
    if (endTime) endTime.disabled = wholeDayYes && wholeDayYes.checked;
    if (wholeDayNo && wholeDayNo.checked) { startTime.setAttribute('required','required'); endTime.setAttribute('required','required'); }
    else { startTime.removeAttribute('required'); endTime.removeAttribute('required'); }
  }
  if (wholeDayYes) wholeDayYes.addEventListener('change', toggle);
  if (wholeDayNo) wholeDayNo.addEventListener('change', toggle);
  toggle();
  if (btnAllDay) btnAllDay.addEventListener('click', function() { setTimes('00:00', '23:59'); });
  if (afterTime) afterTime.addEventListener('change', function() { if (afterTime.value) setTimes(afterTime.value, '23:59'); });
  if (beforeTime) beforeTime.addEventListener('change', function() { if (beforeTime.value) setTimes('00:00', beforeTime.value); });
  form.addEventListener('submit', function() {
    if (wholeDayYes && wholeDayYes.checked) { startTime.value = ''; endTime.value = ''; }
  });
})();
</script>
{% endblock %}
