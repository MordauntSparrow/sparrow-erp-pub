<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Request time off – Scheduling</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: #f1f5f9; }
    .form-control, .form-control:focus { background: #1e293b; color: #f1f5f9; border-color: #334155; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/scheduling/my-requests"><i class="bi bi-arrow-left me-2"></i>Back</a>
    </div>
  </nav>
  <main class="container py-4">
    <h1 class="h5 mb-3">Request time off</h1>
    <form method="post" action="{{ url_for('public_scheduling.request_time_off_submit') }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="mb-2">
        <label class="form-label small">From date</label>
        <input type="date" name="start_date" class="form-control" required>
      </div>
      <div class="mb-2">
        <label class="form-label small">To date</label>
        <input type="date" name="end_date" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label small">Reason (optional)</label>
        <input type="text" name="reason" class="form-control" placeholder="e.g. Holiday">
      </div>
      <button type="submit" class="btn btn-primary">Submit request</button>
    </form>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
