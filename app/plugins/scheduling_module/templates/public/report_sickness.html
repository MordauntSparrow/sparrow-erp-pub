<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Report sickness – Scheduling</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; }
    .form-control, .form-control:focus { background: #1e293b; color: #f1f5f9; border-color: #334155; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/scheduling/my-requests"><i class="bi bi-arrow-left me-2"></i>Back</a>
    </div>
  </nav>
  <main class="container py-4">
    <h1 class="h5 mb-3">Report sickness</h1>
    <p class="text-secondary small">Submit the dates you are unable to work. Your manager will be notified.</p>
    <form method="post" action="{{ url_for('public_scheduling.report_sickness_submit') }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="mb-2">
        <label class="form-label small">First day off</label>
        <input type="date" name="start_date" class="form-control" value="{{ today }}">
      </div>
      <div class="mb-2">
        <label class="form-label small">Last day off</label>
        <input type="date" name="end_date" class="form-control" value="{{ today }}">
      </div>
      <div class="mb-3">
        <label class="form-label small">Notes (optional)</label>
        <input type="text" name="reason" class="form-control" placeholder="e.g. Flu">
      </div>
      <button type="submit" class="btn btn-warning">Report sickness</button>
    </form>
  </main>
  <script>
    document.querySelector('input[name="start_date"]').value = new Date().toISOString().slice(0,10);
    document.querySelector('input[name="end_date"]').value = new Date().toISOString().slice(0,10);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
