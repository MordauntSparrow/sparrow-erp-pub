<!-- templates/public/care_company_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care Company Login</title>
  <!-- Include Material Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.0.0/mdb.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .login-alerts .alert { margin-bottom: 0.75rem; }
    .password-wrapper { position: relative; z-index: 0; }
    .password-wrapper .form-control { padding-right: 2.75rem; }
    .password-toggle-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: none;
      border: none;
      color: #6c757d;
      cursor: pointer;
      padding: 8px;
      font-size: 1rem;
      line-height: 1;
    }
    .password-toggle-btn:hover { color: #0d6efd; }
    .password-toggle-btn i { pointer-events: none; }
    .remember-me { margin-bottom: 1rem; }
    .remember-me label { cursor: pointer; margin-left: 0.5rem; }
  </style>
</head>
<body class="bg-light" style="min-height: 100vh;">

  <!-- Centered container for the login card -->
  <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow-3-strong" style="max-width: 420px; width: 100%;">
      <div class="card-body p-4">
        <!-- Title / Logo area -->
        <h2 class="text-center mb-4">VITA Care Portal</h2>
        <p class="text-center text-muted mb-4">Care Company Login</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="login-alerts mb-3">
              {% for category, message in messages %}
                <div class="alert {{ 'alert-danger' if category == 'error' else 'alert-success' }} d-flex align-items-center" role="alert">
                  <i class="fas {{ 'fa-exclamation-circle' if category == 'error' else 'fa-check-circle' }} me-2"></i>
                  <span>{{ message }}</span>
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        
        <!-- Login Form -->
        <form method="post" autocomplete="on">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
          <div class="form-outline mb-4">
            <input type="text" name="username" id="username" class="form-control" required autocomplete="username" />
            <label class="form-label" for="username">Username</label>
          </div>
          <div class="form-outline mb-4 password-wrapper">
            <input type="password" name="password" id="password" class="form-control" required autocomplete="current-password" />
            <label class="form-label" for="password">Password</label>
            <button type="button" class="password-toggle-btn" id="toggle-password" title="Show password" aria-label="Show password">
              <i class="fas fa-eye" id="toggle-password-icon"></i>
            </button>
          </div>
          <div class="remember-me form-check mb-3">
            <input type="checkbox" class="form-check-input" id="remember" name="remember" value="on" autocomplete="off">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          
          <!-- Login Button -->
          <button type="submit" class="btn btn-primary btn-block w-100">
            Login
          </button>

          <!-- Forgot Password Link -->
          <div class="text-center mt-3">
            <a href="{{ url_for('care_company.reset_password_request') }}">Forgot your password?</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Include Material Bootstrap JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.0.0/mdb.min.js"></script>
  <script>
    (function(){
      var pw = document.getElementById('password');
      var btn = document.getElementById('toggle-password');
      var icon = document.getElementById('toggle-password-icon');
      if (pw && btn && icon) {
        btn.addEventListener('click', function(){
          var isPassword = pw.type === 'password';
          pw.type = isPassword ? 'text' : 'password';
          icon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
          btn.title = isPassword ? 'Hide password' : 'Show password';
          btn.setAttribute('aria-label', btn.title);
        });
      }
    })();
  </script>
</body>
</html>
