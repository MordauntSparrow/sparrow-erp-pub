{% extends 'medical_records_shell.html' %}
{% block title %}Add Care Company User - Sparrow ERP{% endblock %}
{% block content %}
<div class="container mt-5">
  <h1>Add New Care Company User</h1>
  <form action="{{ url_for('medical_records_internal.add_care_company_user') }}" method="POST">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input type="text" class="form-control" id="username" name="username" required>
    </div>
    <div class="mb-3">
      <label for="company_name" class="form-label">Company Name</label>
      <input type="text" class="form-control" id="company_name" name="company_name" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <div class="mb-3">
      <label for="contact_phone" class="form-label">Contact Phone</label>
      <input type="text" class="form-control" id="contact_phone" name="contact_phone">
    </div>
    <div class="mb-3">
      <label for="contact_address" class="form-label">Contact Address</label>
      <textarea class="form-control" id="contact_address" name="contact_address"></textarea>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Initial Password</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <div class="mb-3">
      <label for="confirm_password" class="form-label">Confirm Password</label>
      <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
    </div>
    <div class="mb-3">
      <label for="company_pin" class="form-label">Company PIN (Optional)</label>
      <input type="text" class="form-control" id="company_pin" name="company_pin" maxlength="6" placeholder="6-digit PIN">
      <div class="form-text">If you want to set an initial PIN for portal access, enter it here; otherwise, leave blank.</div>
    </div>
    <button type="submit" class="btn btn-primary">Add User</button>
    <a href="{{ url_for('medical_records_internal.list_care_company_users') }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
