<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My details – HR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0f172a; color: #f1f5f9; }
    .form-control, .form-control:focus { background: #1e293b; color: #f1f5f9; border-color: #334155; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/hr/"><i class="bi bi-arrow-left me-2"></i>HR</a>
    </div>
  </nav>
  <main class="container py-4">
    <h1 class="h5 mb-3">My details</h1>
    <p class="text-secondary small">Keep your contact and emergency details up to date.</p>
    <form method="post" action="{{ url_for('public_hr.profile_save') }}">
      <div class="mb-2">
        <label class="form-label small">Name</label>
        <input type="text" class="form-control" value="{{ profile.name or '' }}" disabled>
      </div>
      <div class="mb-2">
        <label class="form-label small">Email</label>
        <input type="email" class="form-control" value="{{ profile.email or '' }}" disabled>
      </div>
      <div class="mb-2">
        <label class="form-label small">Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ profile.phone or '' }}" placeholder="Your phone number">
      </div>
      <div class="mb-2">
        <label class="form-label small">Address line 1</label>
        <input type="text" name="address_line1" class="form-control" value="{{ profile.address_line1 or '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label small">Address line 2</label>
        <input type="text" name="address_line2" class="form-control" value="{{ profile.address_line2 or '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label small">Postcode</label>
        <input type="text" name="postcode" class="form-control" value="{{ profile.postcode or '' }}">
      </div>
      <div class="mb-2">
        <label class="form-label small">Emergency contact name</label>
        <input type="text" name="emergency_contact_name" class="form-control" value="{{ profile.emergency_contact_name or '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label small">Emergency contact phone</label>
        <input type="text" name="emergency_contact_phone" class="form-control" value="{{ profile.emergency_contact_phone or '' }}">
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
    <a href="/hr/" class="btn btn-outline-light btn-sm mt-3">Back to HR</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
