{% extends "employee_portal_module/base_public.html" %}
{% block title %}HR{% endblock %}
{% block nav %}
<nav class="ep-nav navbar navbar-expand navbar-module" aria-label="Primary">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('public_employee_portal.dashboard') }}"><i class="bi bi-arrow-left me-2" aria-hidden="true"></i>Portal</a>
    <span class="navbar-text fw-semibold">HR</span>
    <div class="navbar-nav ms-auto align-items-center gap-2">
      <a class="nav-link" href="{{ url_for('public_hr.profile') }}">My details</a>
      <span class="navbar-text small me-1" aria-hidden="true">Theme</span>
      <form method="post" action="{{ url_for('sparrow_shared_contractor_ui.set_contractor_theme') }}" class="d-inline"><input type="hidden" name="theme" value="light"><input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"><button type="submit" class="btn btn-sm {{ 'btn-outline-secondary' if (portal_theme|default('dark')) != 'light' else 'btn-secondary' }}" aria-label="Light theme">Light</button></form>
      <form method="post" action="{{ url_for('sparrow_shared_contractor_ui.set_contractor_theme') }}" class="d-inline"><input type="hidden" name="theme" value="dark"><input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"><button type="submit" class="btn btn-sm {{ 'btn-outline-secondary' if (portal_theme|default('dark')) != 'dark' else 'btn-secondary' }}" aria-label="Dark theme">Dark</button></form>
    </div>
  </div>
</nav>
{% endblock %}
