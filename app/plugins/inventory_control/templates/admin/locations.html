{% extends "admin/inventory_admin_base.html" %}
{% block page_title %}Locations — Inventory Control{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4">
    <h1 class="h3 mb-0">Locations</h1>
    <button type="button" class="btn btn-primary btn-sm" data-mdb-toggle="modal" data-mdb-target="#locModal" id="btnAddLoc"><i class="bi bi-plus-lg"></i> Add location</button>
  </div>
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0" id="locations-table">
          <thead class="table-light"><tr><th>Code</th><th>Name</th><th>Type</th><th>Parent</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
  <p class="text-muted small mt-2" id="locations-status">Loading…</p>
</div>

<!-- Add/Edit Location Modal -->
<div class="modal fade" id="locModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="locModalTitle">Add location</h5>
        <button type="button" class="btn-close" data-mdb-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="locForm">
          <input type="hidden" id="locId" name="id">
          <div class="mb-2"><label class="form-label">Code *</label><input type="text" class="form-control" id="locCode" name="code" required placeholder="e.g. WH-A"></div>
          <div class="mb-2"><label class="form-label">Name *</label><input type="text" class="form-control" id="locName" name="name" required></div>
          <div class="mb-2"><label class="form-label">Type</label><select class="form-select" id="locType" name="type"><option value="warehouse">Warehouse</option><option value="store">Store</option><option value="bin">Bin</option><option value="holding">Holding (reconciliation / post-event)</option><option value="virtual">Virtual (site / logical)</option></select></div>
          <div class="mb-2"><label class="form-label">Parent location</label><select class="form-select" id="locParent" name="parent_location_id"><option value="">— None —</option></select></div>
          <div class="mb-0"><label class="form-label">Address</label><textarea class="form-control" id="locAddress" name="address" rows="2"></textarea></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-mdb-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="locSave">Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
  const base = '/plugin/inventory_control';
  const modal = mdb.Modal.getOrCreateInstance(document.getElementById('locModal'));
  let allLocations = [];

  function fillParentDropdown(excludeId) {
    const sel = document.getElementById('locParent');
    sel.innerHTML = '<option value="">— None —</option>';
    allLocations.filter(l => l.id != excludeId).forEach(l => {
      const o = document.createElement('option');
      o.value = l.id;
      o.textContent = (l.code || '') + ' — ' + (l.name || '');
      sel.appendChild(o);
    });
  }

  function loadLocations() {
    fetch(base + '/api/locations', { credentials: 'same-origin' }).then(r => r.json()).then(data => {
      allLocations = data.locations || [];
      const parentMap = {};
      allLocations.forEach(loc => { parentMap[loc.id] = loc.name || loc.code || '#' + loc.id; });
      const tbody = document.querySelector('#locations-table tbody');
      tbody.innerHTML = '';
      allLocations.forEach(loc => {
        const tr = document.createElement('tr');
        const parentName = loc.parent_location_id ? (parentMap[loc.parent_location_id] || '#' + loc.parent_location_id) : '—';
        tr.innerHTML = '<td>' + (loc.code || '') + '</td><td>' + (loc.name || '') + '</td><td>' + (loc.type || '') + '</td><td>' + parentName + '</td><td><button type="button" class="btn btn-sm btn-outline-primary edit-loc" data-id="' + loc.id + '">Edit</button></td>';
        tbody.appendChild(tr);
      });
      document.getElementById('locations-status').textContent = allLocations.length + ' location(s)';
      tbody.querySelectorAll('.edit-loc').forEach(btn => btn.addEventListener('click', function() { openEdit(parseInt(this.dataset.id, 10)); }));
    }).catch(() => { document.getElementById('locations-status').textContent = 'Error loading locations'; });
  }

  function openAdd() {
    document.getElementById('locModalTitle').textContent = 'Add location';
    document.getElementById('locId').value = '';
    document.getElementById('locForm').reset();
    document.getElementById('locType').value = 'warehouse';
    fillParentDropdown(null);
    modal.show();
  }

  function openEdit(id) {
    fetch(base + '/api/locations/' + id, { credentials: 'same-origin' }).then(r => r.json()).then(loc => {
      document.getElementById('locModalTitle').textContent = 'Edit location';
      document.getElementById('locId').value = loc.id;
      document.getElementById('locCode').value = loc.code || '';
      document.getElementById('locName').value = loc.name || '';
      document.getElementById('locType').value = loc.type || 'warehouse';
      document.getElementById('locAddress').value = loc.address || '';
      fillParentDropdown(id);
      document.getElementById('locParent').value = loc.parent_location_id || '';
      modal.show();
    }).catch(() => alert('Could not load location'));
  }

  document.getElementById('btnAddLoc').addEventListener('click', openAdd);

  document.getElementById('locSave').addEventListener('click', function() {
    const id = document.getElementById('locId').value;
    const parentVal = document.getElementById('locParent').value;
    const payload = {
      code: document.getElementById('locCode').value.trim(),
      name: document.getElementById('locName').value.trim(),
      type: document.getElementById('locType').value,
      parent_location_id: parentVal ? parseInt(parentVal, 10) : null,
      address: document.getElementById('locAddress').value.trim() || null
    };
    if (!payload.code || !payload.name) { alert('Code and Name are required'); return; }
    const url = id ? base + '/api/locations/' + id : base + '/api/locations';
    const method = id ? 'PUT' : 'POST';
    fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), credentials: 'same-origin' })
      .then(r => r.json()).then(data => {
        if (data.error) { alert(data.error); return; }
        modal.hide();
        loadLocations();
      }).catch(() => alert('Request failed'));
  });

  loadLocations();
})();
</script>
{% endblock %}
