{% extends "ventus_admin_base.html" %}

{% block content %}
<div class="map-wrap">
  <div id="map"></div>
</div>

<!-- Panels container: allows multiple open sidebar panels and popouts -->
<div class="cad-panels" id="panelsContainer" aria-live="polite"></div>

<!-- KPI/Stats Topbar -->
<div id="kpiStatsPanel" style="position:fixed;top:80px;right:20px;z-index:2000;display:flex;gap:20px;align-items:center;">
  <span id="kpiActiveJobs"></span>
  <span id="kpiUnitsAvail"></span>
  <span id="kpiClearedToday"></span>
  <span id="kpiAvgResp"></span>
  <button id="darkModeBtn">🌙 Dark</button>
</div>

<!-- Toast notifications -->
<div id="toast" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:none;z-index:5000;"></div>

<!-- Notification stack (bottom-right) -->
<div id="notifications" class="notifications-container" aria-live="polite"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ===== PANEL MANAGEMENT WITH DRAG/RESIZE =====

const PanelManager = {
  panels: {},
  map: null,
  container: document.getElementById('panelsContainer'),
  socket: null,
  
  init() {
    this.setupMap();
    this.setupPanels();
    this.setupRealtime();
    this.setupRailButtons();
  },

  setupMap() {
    this.map = L.map('map').setView([40.7128, -74.0060], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19,
    }).addTo(this.map);
  },

  setupPanels() {
    // Initialize with an empty container
    const savedPositions = JSON.parse(sessionStorage.getItem('panel_positions') || '{}');
    this.restorePanelPositions(savedPositions);
  },

  setupRealtime() {
    if (typeof io !== 'undefined') {
      this.socket = io();
      this.socket.on('job_update', (data) => this.onJobUpdate(data));
      this.socket.on('unit_update', (data) => this.onUnitUpdate(data));
      this.socket.on('message_update', (data) => this.onMessageUpdate(data));
    }
  },

  setupRailButtons() {
    document.getElementById('btnJobs')?.addEventListener('click', (e) => {
      e.preventDefault();
      this.getOrCreatePanel('jobs', 'CAD Stack');
    });
    document.getElementById('btnUnits')?.addEventListener('click', (e) => {
      e.preventDefault();
      this.getOrCreatePanel('units', 'Active Units');
    });
    document.getElementById('btnMsgs')?.addEventListener('click', (e) => {
      e.preventDefault();
      this.getOrCreatePanel('messages', 'Messages');
    });
  },

  getOrCreatePanel(type, title) {
    const existingPanel = Object.values(this.panels).find(p => p.type === type);
    if (existingPanel) {
      existingPanel.focus();
      return;
    }
    this.createPanel(type, title);
  },

  createPanel(type, title) {
    const panelId = 'panel-' + type + '-' + Date.now();
    const panelEl = document.createElement('div');
    panelEl.className = 'cad-panel';
    panelEl.id = panelId;
    panelEl.style.minWidth = '380px';
    panelEl.dataset.panelType = type;
    const createCadHeaderBtnHtml = (type === 'jobs')
      ? '<button type="button" class="panel-btn create-cad" data-action="create-cad" aria-label="Create CAD" title="Create CAD"><i class="bi bi-plus-lg"></i></button>'
      : '';
    const declareMiHeaderBtnMarkup = '<button type="button" class="panel-btn declare-mi" data-action="declare-mi" aria-label="Declare Major Incident" title="Declare Major Incident"><i class="bi bi-exclamation-octagon-fill"></i></button>';
    const declareMiJobsHeaderHtml = (type === 'jobs') ? declareMiHeaderBtnMarkup : '';
    panelEl.innerHTML = `
      <div class="cad-panel-header">
        <span class="panel-title">${title}</span>
        <div class="cad-panel-controls">
          ${createCadHeaderBtnHtml}
          ${declareMiJobsHeaderHtml}
          <button class="panel-btn popout" data-action="popout" title="Pop out to window">
            <i class="bi bi-box-arrow-up-right"></i>
          </button>
          <button class="panel-btn close" data-action="close" title="Close">
            <i class="bi bi-x"></i>
          </button>
        </div>
      </div>
      <div class="cad-panel-body" style="padding:16px;">
        <div style="text-align:center;color:var(--text-muted);font-size:12px;">
          <i class="bi bi-hourglass-split" style="font-size:24px;margin-bottom:8px;display:block;"></i>
          Loading...
        </div>
      </div>
    `;

    this.container.appendChild(panelEl);

    // Store panel ref
    this.panels[panelId] = {
      id: panelId,
      type: type,
      title: title,
      element: panelEl,
      focus() {
        panelEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      },
    };

    // Setup controls
    panelEl.querySelector('[data-action="popout"]').addEventListener('click', (e) => {
      e.stopPropagation();
      this.popoutPanel(panelId);
    });

    const createCadHdr = panelEl.querySelector('[data-action="create-cad"]');
    if (createCadHdr) {
      createCadHdr.addEventListener('click', (e) => {
        e.stopPropagation();
        try {
          window.location.href = '/plugin/ventus_response_module/response';
        } catch (errCad) {}
      });
    }

    const declareMiHdr = panelEl.querySelector('[data-action="declare-mi"]');
    if (declareMiHdr) {
      declareMiHdr.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        try { if (window.openCadMajorIncidentDeclareModal) window.openCadMajorIncidentDeclareModal({}); } catch (errMi) {}
      });
    }

    panelEl.querySelector('[data-action="close"]').addEventListener('click', (e) => {
      e.stopPropagation();
      this.closePanel(panelId);
    });

    // Setup draggability with interact.js
    this.setupDragResize(panelId);

    // Load content
    this.loadPanelContent(panelId, type);
  },

  setupDragResize(panelId) {
    const panelEl = document.getElementById(panelId);
    if (!panelEl || !window.interact) return;

    // Make draggable from header
    const header = panelEl.querySelector('.cad-panel-header');
    if (!header) return;

    let startX, startY, offsetX = 0, offsetY = 0;

    header.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.cad-panel-controls')) return; // Don't drag from buttons

      startX = e.clientX;
      startY = e.clientY;
      offsetX = panelEl.offsetLeft || 0;
      offsetY = panelEl.offsetTop || 0;

      const onMove = (moveE) => {
        const dx = moveE.clientX - startX;
        const dy = moveE.clientY - startY;
        panelEl.style.opacity = '0.85';
        panelEl.style.zIndex = '150';
      };

      const onUp = (upE) => {
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        panelEl.style.opacity = '1';
        panelEl.style.zIndex = '';
      };

      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  },

  loadPanelContent(panelId, type) {
    const panelEl = document.getElementById(panelId);
    if (!panelEl) return;

    const contentEl = panelEl.querySelector('.cad-panel-body');

    // Simulate loading based on type
    setTimeout(() => {
      if (type === 'jobs') {
        this.renderJobsPanel(contentEl);
      } else if (type === 'units') {
        this.renderUnitsPanel(contentEl);
      } else if (type === 'messages') {
        this.renderMessagesPanel(contentEl);
      }
    }, 300);
  },

  renderJobsPanel(contentEl) {
    const sampleJobs = [
      { id: 1, addr: '123 Main St', type: 'Medical', status: 'pending', time: '14:23' },
      { id: 2, addr: '456 Oak Ave', type: 'Welfare Check', status: 'assigned', time: '14:18' },
      { id: 3, addr: '789 Pine Rd', type: 'Transport', status: 'cleared', time: '13:55' },
    ];

    const html = `
      <div style="margin-bottom:12px;">
        <input type="search" placeholder="Search jobs..." style="margin-bottom:8px;">
        <button class="btn" style="width:100%;"><i class="bi bi-plus-lg"></i> New Job</button>
      </div>
      <ul style="list-style:none;padding:0;margin:0;">
        ${sampleJobs.map(j => `
          <li class="panel-list-item" title="${j.addr}">
            <i class="bi bi-exclamation-circle" style="color:var(--accent);"></i>
            <span>
              <div style="font-weight:500;">${j.addr.slice(0, 20)}</div>
              <div class="meta">${j.type} • ${j.time}</div>
            </span>
            <span class="status ${j.status}">${j.status}</span>
          </li>
        `).join('')}
      </ul>
    `;
    contentEl.innerHTML = html;
  },

  renderUnitsPanel(contentEl) {
    const sampleUnits = [
      { id: 'A01', status: 'available', loc: 'Station 1' },
      { id: 'A02', status: 'on-scene', loc: '123 Main' },
      { id: 'A03', status: 'at-hospital', loc: 'City Hospital' },
    ];

    const html = `
      <div style="margin-bottom:12px;">
        <input type="search" placeholder="Search units..." style="margin-bottom:8px;">
      </div>
      <ul style="list-style:none;padding:0;margin:0;">
        ${sampleUnits.map(u => `
          <li class="panel-list-item">
            <i class="bi bi-truck-front" style="color:var(--accent);"></i>
            <span>
              <div style="font-weight:600;">${u.id}</div>
              <div class="meta">${u.loc}</div>
            </span>
            <span class="status ${u.status}" style="background:rgba(16,185,129,0.2);color:var(--accent-success);">${u.status}</span>
          </li>
        `).join('')}
      </ul>
    `;
    contentEl.innerHTML = html;
  },

  renderMessagesPanel(contentEl) {
    const sampleMessages = [
      { from: 'Dispatch', text: 'Unit A01 assigned to Job #1', time: '14:25' },
      { from: 'Unit A02', text: 'En route to scene', time: '14:20' },
      { from: 'Dispatch', text: 'All units stand by', time: '14:10' },
    ];

    const html = `
      <div style="margin-bottom:12px;">
        <input type="search" placeholder="Search messages..." style="margin-bottom:8px;">
      </div>
      <ul style="list-style:none;padding:0;margin:0;">
        ${sampleMessages.map(m => `
          <li class="panel-list-item" style="border-left:2px solid var(--accent);">
            <i class="bi bi-chat-dots" style="color:var(--accent);"></i>
            <span>
              <div style="font-weight:500;">${m.from}</div>
              <div class="meta">${m.text} • ${m.time}</div>
            </span>
          </li>
        `).join('')}
      </ul>
      <div style="margin-top:12px;">
        <input type="text" placeholder="Type message..." style="margin-bottom:6px;">
        <button class="btn" style="width:100%;"><i class="bi bi-send"></i> Send</button>
      </div>
    `;
    contentEl.innerHTML = html;
  },

  closePanel(panelId) {
    const panel = this.panels[panelId];
    if (!panel) return;

    const el = panel.element;
    el.style.animation = 'slideIn 0.3s ease reverse';
    setTimeout(() => {
      el.remove();
      delete this.panels[panelId];
    }, 300);
  },

  popoutPanel(panelId) {
    const panel = this.panels[panelId];
    if (!panel) return;

    const url = `/plugins/ventus_response_module/templates/cad/panel.html?type=${panel.type}&title=${encodeURIComponent(panel.title)}`;
    const w = window.open(url, 'ventus-popout-' + panelId, 'width=500,height=600');
    if (!w) {
      this.showNotification('warning', 'Pop-out Blocked', 'Browser may have blocked the pop-out window.');
      return;
    }

    // Close the panel in the sidebar
    this.closePanel(panelId);
    this.showNotification('success', 'Panel Opened', `${panel.title} opened in new window.`);
  },

  onJobUpdate(data) {
    // Reload jobs panel if exists
    const jobsPanel = Object.values(this.panels).find(p => p.type === 'jobs');
    if (jobsPanel) {
      const contentEl = jobsPanel.element.querySelector('.cad-panel-body');
      this.renderJobsPanel(contentEl);
    }
  },

  onUnitUpdate(data) {
    const unitsPanel = Object.values(this.panels).find(p => p.type === 'units');
    if (unitsPanel) {
      const contentEl = unitsPanel.element.querySelector('.cad-panel-body');
      this.renderUnitsPanel(contentEl);
    }
  },

  onMessageUpdate(data) {
    const msgsPanel = Object.values(this.panels).find(p => p.type === 'messages');
    if (msgsPanel) {
      const contentEl = msgsPanel.element.querySelector('.cad-panel-body');
      this.renderMessagesPanel(contentEl);
    }
  },

  restorePanelPositions(positions) {
    // Could be extended to restore scroll position, etc.
  },

  showNotification(type, title, message) {
    const notifEl = document.createElement('div');
    notifEl.className = `notification ${type}`;
    notifEl.innerHTML = `
      <div class="notif-header">
        <span>
          ${type === 'success' ? '<i class="bi bi-check-circle"></i>' : ''}
          ${type === 'warning' ? '<i class="bi bi-exclamation-triangle"></i>' : ''}
          ${type === 'danger' ? '<i class="bi bi-x-circle"></i>' : ''}
          ${title}
        </span>
        <button class="notif-close">×</button>
      </div>
      <div class="notif-body">${message}</div>
    `;

    const container = document.getElementById('notifications');
    container.appendChild(notifEl);

    notifEl.querySelector('.notif-close').addEventListener('click', () => {
      notifEl.style.animation = 'slideIn 0.3s ease reverse';
      setTimeout(() => notifEl.remove(), 300);
    });

    setTimeout(() => {
      if (notifEl.parentElement) {
        notifEl.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => notifEl.remove(), 300);
      }
    }, 5000);
  },
};

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
  PanelManager.init();

  // Dark mode toggle
  document.getElementById('darkModeBtn')?.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('cad_dark_mode', document.body.classList.contains('dark-mode'));
  });

  if (localStorage.getItem('cad_dark_mode') === 'true') {
    document.body.classList.add('dark-mode');
  }
});
</script>

{% endblock %}
