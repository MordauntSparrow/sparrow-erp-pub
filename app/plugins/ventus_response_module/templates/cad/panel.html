    function reopenPastCadFromList(cad) {
      const cadInt = parseInt(String(cad), 10);
      if (!Number.isInteger(cadInt) || cadInt <= 0) return;
      const rid = `pjReopen_${cadInt}_`;
      const modal = document.createElement('div');
      modal.id = 'reopenCadModal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:7000;';
      modal.innerHTML = `
        <div style="width:min(440px,92vw);background:var(--secondary-light,rgba(30,41,59,0.98));border:1px solid var(--border-color);border-radius:12px;padding:16px;">
          <div style="font-weight:700;margin-bottom:6px;">Reopen CAD #${escapeHtml(String(cadInt))}</div>
          <div class="meta" style="margin-bottom:12px;line-height:1.45;color:var(--text-secondary);">Returns this CAD to the <strong>active stack</strong> as queued. Choose why it is being reopened; this is stored on the CAD comms log and audit trail.</div>
          <div style="margin-bottom:12px;">
            <label for="${rid}reason" style="display:block;font-weight:600;margin-bottom:6px;">Reopen Reason <span style="font-weight:500;color:var(--text-muted);">(required)</span></label>
            <select id="${rid}reason" style="width:100%;padding:8px 12px;background:var(--bg-dark);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:13px;">
              <option value="" selected disabled>Select a reason…</option>
              <option value="closed_in_error">Closed in error</option>
              <option value="test_training">Test/Training</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div id="${rid}otherWrap" style="display:none;margin-bottom:14px;">
            <label for="${rid}notes" style="display:block;font-weight:600;margin-bottom:6px;">Further Details <span style="font-weight:500;color:var(--text-muted);">(required)</span></label>
            <textarea id="${rid}notes" rows="4" placeholder="Describe why this CAD is being reopened…" style="width:100%;padding:8px 12px;background:var(--bg-dark);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:13px;resize:vertical;box-sizing:border-box;"></textarea>
          </div>
          <div style="display:flex;gap:8px;">
            <button type="button" id="${rid}cancel" class="btn" style="flex:1;background:transparent;border:1px solid var(--border-color);">Cancel</button>
            <button type="button" id="${rid}confirm" class="btn" style="flex:1;background:rgba(245,158,11,0.25);border:1px solid var(--border-color);color:var(--text-primary);"><i class="bi bi-arrow-counterclockwise"></i> Reopen CAD</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      const reasonSel = modal.querySelector(`#${rid}reason`);
      const otherWrap = modal.querySelector(`#${rid}otherWrap`);
      const syncUi = () => {
        const v = reasonSel ? String(reasonSel.value || '').trim() : '';
        if (otherWrap) otherWrap.style.display = v === 'other' ? 'block' : 'none';
      };
      reasonSel?.addEventListener('change', syncUi);
      syncUi();
      const closeModal = () => { try { modal.remove(); } catch (e) {} };
      modal.querySelector(`#${rid}cancel`)?.addEventListener('click', closeModal);
      modal.addEventListener('click', (ev) => { if (ev.target === modal) closeModal(); });
      modal.querySelector(`#${rid}confirm`)?.addEventListener('click', async () => {
        const code = reasonSel ? String(reasonSel.value || '').trim() : '';
        if (!code) {
          setStatus('Select a reopen reason before continuing.');
          return;
        }
        let otherText = '';
        if (code === 'other') {
          otherText = String(modal.querySelector(`#${rid}notes`)?.value || '').trim();
          if (!otherText) {
            setStatus('Enter further details when reopen reason is Other.');
            return;
          }
        }
        const confirmBtn = modal.querySelector(`#${rid}confirm`);
        if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = 'Reopening…'; }
        closeModal();
        try {
          const res = await fetch(`/plugin/ventus_response_module/job/${encodeURIComponent(cadInt)}/reopen`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({
              reopen_reason: code,
              other_details: code === 'other' ? otherText : '',
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `Reopen failed (${res.status})`);
          setStatus(data.message || `CAD #${cadInt} reopened`);
          await renderPastJobs();
        } catch (e) {
          setStatus(e.message || 'Reopen failed');
        }
      });
    }

          const div = String(jobDivisionLabel(j) || '').toLowerCase();
          const pr = String(j.priority || '').toLowerCase();
          return c.includes(q) || st.includes(q) || pst.includes(q) || reason.includes(q) || addr.includes(q) || pc.includes(q) || div.includes(q) || pr.includes(q);
        });
        draw(filtered);
      });
      setStatus(`${all.length} past / closed jobs`);
    }

    async function renderMessages(preselectCallsign) {
      contentEl.innerHTML = `
        <div style="margin-bottom:10px;border:1px solid var(--border-color);border-radius:10px;padding:10px;background:rgba(0,0,0,0.2);">
          <div style="font-weight:700;margin-bottom:6px;">Dispatch Note / MOTD</div>
          <div id="motdDisplay" style="font-size:12px;color:var(--text-secondary);padding:8px;border:1px dashed var(--border-color);border-radius:8px;background:rgba(0,0,0,0.2);margin-bottom:8px;">Loading note...</div>
          <div style="display:flex;gap:6px;">
            <button class="btn full" id="motdReload" style="background:transparent;border:1px solid var(--border-color);"><i class="bi bi-arrow-clockwise"></i> Refresh Note</button>
          </div>
          <div id="motdMeta" class="meta" style="margin-top:6px;">Loading note...</div>
        </div>
        <div style="margin-bottom:10px;">
          <select id="msgUnit" style="width:100%;padding:10px;border-radius:8px;background:rgba(0,0,0,0.2);border:1px solid var(--border-color);color:var(--text-primary);margin-bottom:8px;"></select>
          <button class="btn full" id="msgReload"><i class="bi bi-arrow-clockwise"></i> Reload Messages</button>
        </div>
        <div class="section-title">Messages</div>
        <ul id="msgList" style="list-style:none;padding:0;margin:0 0 10px 0;"></ul>
        <input type="text" id="msgText" placeholder="Type message...">
        <button class="btn full" id="msgSend"><i class="bi bi-send"></i> Send</button>
      `;

      const unitSel = document.getElementById('msgUnit');
      const listEl = document.getElementById('msgList');
      const textEl = document.getElementById('msgText');
      const sendBtn = document.getElementById('msgSend');
      const reloadBtn = document.getElementById('msgReload');
      const motdDisplayEl = document.getElementById('motdDisplay');
      const motdMetaEl = document.getElementById('motdMeta');
      const motdReloadBtn = document.getElementById('motdReload');

      const loadMotd = async () => {
        try {
          const motd = await fetchJson('/plugin/ventus_response_module/dispatch/motd');
          motdDisplayEl.textContent = (motd.text || '').trim() || 'No dispatch note set.';
          const when = motd.updated_at ? sparrowFormatDateTime(motd.updated_at) : 'never';
          motdMetaEl.textContent = `Last updated ${when} by ${motd.updated_by || 'unknown'}`;
        } catch (e) {
          motdDisplayEl.textContent = 'Unable to load dispatch note.';
          motdMetaEl.textContent = `Unable to load note (${e.message || 'error'})`;
        }
      };

      motdReloadBtn.addEventListener('click', () => { loadMotd().catch(() => {}); });

      const units = await fetchJson('/plugin/ventus_response_module/units');
      const callsigns = (Array.isArray(units) ? units : [])
        .map(u => u.callSign)
        .filter(Boolean);

      if (!callsigns.length) {
        unitSel.innerHTML = `<option value="">No units available</option>`;
        listEl.innerHTML = emptyState('Sign on a unit to view/send messages.');
        setStatus('No units');
        return;
      }

      unitSel.innerHTML = callsigns.map(cs => `<option value="${escapeHtml(cs)}">${escapeHtml(cs)}</option>`).join('');
      if (preselectCallsign && callsigns.includes(preselectCallsign)) {
        unitSel.value = preselectCallsign;
      }

      const loadMsgs = async () => {
        const cs = unitSel.value;
        if (!cs) {
          listEl.innerHTML = emptyState('Select a unit.');
          return;
        }
        const rows = await fetchJson(`/plugin/ventus_response_module/messages/${encodeURIComponent(cs)}`);
        const all = Array.isArray(rows) ? rows : [];
        if (!all.length) {
          listEl.innerHTML = emptyState('No messages yet.');
        } else {
          const list = all.slice(-50).reverse();
          listEl.innerHTML = list.map((m, idx) => `
            <li class="panel-list-item" data-msg-index="${idx}">
              <i class="bi bi-chat-dots" style="color:var(--accent);"></i>
              <span>
                <div style="font-weight:600;">${escapeHtml(m.from || 'unknown')}</div>
                <div class="meta">${escapeHtml(m.text || '')}</div>
                <div class="meta">${escapeHtml(sparrowFormatDateTime(m.timestamp))}</div>
              </span>
            </li>
          `).join('');
          listEl.querySelectorAll('[data-msg-index]').forEach(row => {
            row.addEventListener('click', () => {
              const i = Number(row.getAttribute('data-msg-index'));
              if (Number.isInteger(i) && list[i]) renderMessageDetail(cs, list[i], list);
            });
          });
        }
        setStatus(`${all.length} messages (${cs})`);
      };

      unitSel.addEventListener('change', () => { loadMsgs().catch(() => setStatus('Load failed')); });
      reloadBtn.addEventListener('click', () => { loadMsgs().catch(() => setStatus('Load failed')); });
      sendBtn.addEventListener('click', async () => {
        const cs = unitSel.value;
        const text = (textEl.value || '').trim();
        if (!cs || !text) return;
        sendBtn.disabled = true;
        try {
          await fetch(`/plugin/ventus_response_module/messages/${encodeURIComponent(cs)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, from: 'dispatcher' })
          });
          textEl.value = '';
          await loadMsgs();
        } finally {
          sendBtn.disabled = false;
        }
      });

      await loadMotd();
      await loadMsgs();
    }

    async function renderContent() {
      if (panelType === 'jobs' && panelJobDetailOpen) {
        return;
      }
      setStatus('Loading...');
      await refreshDivisionMeta();
      if (panelType === 'jobs') await renderJobs();
      else if (panelType === 'units') await renderUnits();
      else if (panelType === 'messages') await renderMessages();
      else if (panelType === 'past_jobs') await renderPastJobs();
      else contentEl.innerHTML = emptyState(`Unsupported panel type: ${panelType}`);
      if (statusEl.textContent === 'Loading...') setStatus('Ready');
    }

    titleEl.textContent = panelTitle;
    setIcon(panelType);

    closeBtn.addEventListener('click', () => window.close());
    refreshBtn.addEventListener('click', () => {
      if (panelType === 'jobs' && panelJobDetailOpen && panelJobDetailCad != null) {
        renderJobDetail(panelJobDetailCad, panelJobDetailIsPast).catch(() => setStatus('Refresh failed'));
        return;
      }
      renderContent().catch(() => setStatus('Refresh failed'));
    });

    renderContent().catch(err => {
      contentEl.innerHTML = emptyState(`Failed to load panel data (${err.message || 'error'}).`);
      setStatus('Load failed');
    });

    if (socket) {
      socket.on('mdt_event', () => {
        if (panelType === 'jobs' && panelJobDetailOpen) return;
        renderContent().catch(() => setStatus('Live refresh failed'));
      });
    }
    setInterval(() => {
      if (!document.hidden) {
        if (panelType === 'jobs' && panelJobDetailOpen) return;
        renderContent().catch(() => setStatus('Auto-refresh failed'));
      }
    }, 20000);

    try {
      if (typeof BroadcastChannel !== 'undefined') {
        const bc = new BroadcastChannel('ventus_cad');
        bc.onmessage = function(ev) {
          try {
            const msg = ev.data || {};
            if (msg && msg.type === 'panel_content' && msg.panel_type === panelType && msg.html) {
              contentEl.innerHTML = msg.html;
              if (msg.title) titleEl.textContent = msg.title;
              setStatus('Live');
            }
          } catch (e) {}
        };
      }
    } catch (e) {}
  </script>
</body>
</html>
