<section class="py-5 {{ 'bg-light' if bg=='light' else ('bg-dark text-white' if bg=='dark' else '') }}">
  <div class="container text-center">
    <h1 class="display-5 fw-bold mb-3">{{ headline }}</h1>
    {% if sub %}<p class="lead mb-4">{{ sub }}</p>{% endif %}
    {% if cta_text %}<a href="#" class="btn btn-primary btn-lg">{{ cta_text }}</a>{% endif %}
  </div>
</section>
