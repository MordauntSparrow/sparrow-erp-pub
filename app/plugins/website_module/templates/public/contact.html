{% extends "public/base.html" %}

{% block title %}Contact Us{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h1 class="mb-3">Contact Us</h1>
      <p>If you have any questions, please use the form below or call <strong>01403 741320</strong>.</p>

      <form action="{{ url_for('website_public.form_submit') }}" method="post">
        <input type="hidden" name="form_id" value="default">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
          <label for="phone" class="form-label">Phone</label>
          <input type="text" class="form-control" id="phone" name="phone">
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
        </div>
        <!-- Honeypot field to catch bots -->
        <div style="display:none;">
          <label>Leave this field empty</label>
          <input type="text" name="hp_field" value="">
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
