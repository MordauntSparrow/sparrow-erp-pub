# /etc/nginx/sites-available/default
# Works without SSL (e.g. Railway where TLS is terminated at the edge).
# For HTTPS with your own certs, see nginx.ssl.conf.example and include or replace with it.

limit_req_zone $binary_remote_addr zone=sparrow_per_ip:10m rate=15r/s;

# Admin: control-centre.{domain}
server {
    listen 80;
    server_name ~^control-centre\..+$;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Drop common exploit/scanner probes before they reach Flask.
    location ~* ^/(?:\.|wp-|wordpress|phpmyadmin|cgi-bin|vendor(?:/|\.js$)|node_modules/|composer\.(?:json|lock)|package(?:-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|Dockerfile|docker-compose\.ya?ml|server-status|config(?:/|\.|$)|backup(?:/|\.|$)|api-docs/swagger\.json|swagger(?:/|\.|$)|openapi(?:\.json|/)|manifest\.json|asset-manifest\.json|env\.json|\.env|\.git|\.svn|\.hg|@vite/client|\.vite/) {
        access_log off;
        return 444;
    }

    # Proxy to admin app (Flask + Socket.IO)
    location / {
        limit_req zone=sparrow_per_ip burst=40 nodelay;
        proxy_pass http://127.0.0.1:82;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}

# Default server: /admin -> admin app, everything else -> website
server {
    listen 80 default_server;
    server_name _;

    # Drop common exploit/scanner probes before they hit the app stack.
    location ~* ^/(?:\.(?!well-known/)|wp-|wordpress|phpmyadmin|cgi-bin|vendor(?:/|\.js$)|node_modules/|composer\.(?:json|lock)|package(?:-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|Dockerfile|docker-compose\.ya?ml|server-status|config(?:/|\.|$)|backup(?:/|\.|$)|api-docs/swagger\.json|swagger(?:/|\.|$)|openapi(?:\.json|/)|manifest\.json|asset-manifest\.json|env\.json|\.env|\.git|\.svn|\.hg|@vite/client|\.vite/) {
        access_log off;
        return 444;
    }

    location ~ ^/admin(/.*)?$ {
        limit_req zone=sparrow_per_ip burst=30 nodelay;
        proxy_pass http://127.0.0.1:82$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        limit_req zone=sparrow_per_ip burst=60 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
