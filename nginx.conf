# /etc/nginx/sites-available/default
# Works without SSL (e.g. Railway where TLS is terminated at the edge).
# For HTTPS with your own certs, see nginx.ssl.conf.example and include or replace with it.

# Admin: control-centre.{domain}
server {
    listen 80;
    server_name ~^control-centre\..+$;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Proxy to admin app (Flask + Socket.IO)
    location / {
        proxy_pass http://127.0.0.1:82;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}

# Default server: /admin -> admin app, everything else -> website
server {
    listen 80 default_server;
    server_name _;

    location ~ ^/admin(/.*)?$ {
        proxy_pass http://127.0.0.1:82$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
